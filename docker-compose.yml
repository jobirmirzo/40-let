services:
  backend:
    image: ghcr.io/jobirmirzo/40-let-backend:latest
    restart: unless-stopped
    ports:
      - "5000:8080"          # host:container — ASP.NET listens on 8080 in the container
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: