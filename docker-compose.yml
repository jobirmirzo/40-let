services:
  postgres:
    image: postgres:17-alpine
    container_name: fortylet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fortylet
      POSTGRES_PASSWORD: N38s039Qbv7W3ZzACuAWIEK
      POSTGRES_DB: fortylet
    ports:
      - "5433:5432"
    volumes:
      - fortylet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortylet -d fortylet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fortylet_pgdata:
